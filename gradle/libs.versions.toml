[versions]
# Root build.gradle versions
androidGradlePlugin = "8.9.3"
kotlin = "2.2.10" # org.jetbrains.kotlin.android and org.jetbrains.kotlin.plugin.compose
composeCompiler = "1.5.13" # ext.compose_compiler_version
compose = "1.6.7" # ext.compose_version
navigation = "2.8.9" # ext.nav_version

# app module versions
androidxCoreKtx = "1.17.0"
androidxLifecycle = "2.8.7" # For lifecycle-runtime-ktx
androidxLifecycleViewmodelCompose = "2.9.3" # For lifecycle-viewmodel-compose in app, and lifecycle-runtime-ktx in mahati
androidxActivityCompose = "1.10.1"
junit = "4.13.2"
androidxTestExtJunit = "1.2.1" # app module
androidxTestEspressoCore = "3.7.0"
androidxDatastorePreferences = "1.1.7"
moquette = "0.18.0"
accompanistPermissions = "0.37.3"
hivemqMqttClient = "1.3.9" # Added HiveMQ client

# mahati module versions
androidxComposeBom = "2025.08.01"
androidxTestExtJunitMahati = "1.3.0" # mahati module (different from app)

[libraries]
# app module dependencies
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "androidxCoreKtx" }
androidx-compose-ui = { group = "androidx.compose.ui", name = "ui", version.ref = "compose" }
androidx-compose-material = { group = "androidx.compose.material", name = "material", version.ref = "compose" }
androidx-compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview", version.ref = "compose" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "androidxLifecycle" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "androidxActivityCompose" }
androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "androidxLifecycleViewmodelCompose" }
junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidxTestExtJunit" }
androidx-test-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "androidxTestEspressoCore" }
androidx-compose-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4", version.ref = "compose" }
androidx-compose-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling", version.ref = "compose" }
androidx-navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigation" }
androidx-datastore-preferences = { group = "androidx.datastore", name = "datastore-preferences", version.ref = "androidxDatastorePreferences" }
moquette-broker = { group = "com.github.moquette-io", name = "moquette-broker", version.ref = "moquette" } # Renamed from 'moquette' for clarity
accompanist-permissions = { group = "com.google.accompanist", name = "accompanist-permissions", version.ref = "accompanistPermissions" }
hivemq-mqtt-client = { group = "com.hivemq", name = "hivemq-mqtt-client", version.ref = "hivemqMqttClient" } # Added HiveMQ client

# mahati module dependencies
androidx-lifecycle-runtime-ktx-mahati = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "androidxLifecycleViewmodelCompose" } # Uses version from app's viewmodel-compose
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "androidxComposeBom" }
androidx-compose-ui-mahati = { group = "androidx.compose.ui", name = "ui" } # No version, uses BOM
androidx-compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" } # No version, uses BOM
androidx-compose-material3 = { group = "androidx.compose.material3", name = "material3" } # No version, uses BOM
androidx-test-ext-junit-mahati = { group = "androidx.test.ext", name = "junit", version.ref = "androidxTestExtJunitMahati" }
androidx-compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" } # No version, uses BOM

[plugins]
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
android-library = { id = "com.android.library", version.ref = "androidGradlePlugin" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }

[bundles]
# No bundles defined for now, can be added later if needed
